# ============================================
# Docker Compose: .NET + React + PostgreSQL + Redis
# Amaç: Tek komutla tüm servisleri ayağa kaldır
# Kullanım: docker-compose -f docker-compose.dotnet-react.yml up -d
# ============================================

version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: "{{project_name}}_db"
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-appdb}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: "{{project_name}}_redis"
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: "{{project_name}}_backend"
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=db;Database=${DB_NAME:-appdb};Username=${DB_USER:-postgres};Password=${DB_PASSWORD:-postgres123}
      - Redis__ConnectionString=redis:6379
      - Jwt__Secret=${JWT_SECRET:-super-secret-key-min-32-characters-long}
      - "Jwt__Issuer=${JWT_ISSUER:-{{project_name}}}"
      - "Jwt__Audience=${JWT_AUDIENCE:-{{project_name}}-client}"
    ports:
      - "5000:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: "{{project_name}}_frontend"
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:

networks:
  default:
    name: "{{project_name}}_network"
