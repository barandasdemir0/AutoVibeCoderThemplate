name: {{project_name}}
description: {{PROJECT_DESCRIPTION}}
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0
  firebase_storage: ^11.6.0

  # State Management
  provider: ^6.1.0

  # Navigation
  go_router: ^13.2.0

  # UI
  cached_network_image: ^3.3.1
  flutter_screenutil: ^5.9.0
  shimmer: ^3.0.0
  flutter_svg: ^2.0.9

  # Utils
  intl: ^0.19.0
  flutter_dotenv: ^5.1.0
  shared_preferences: ^2.2.2
  image_picker: ^1.0.7

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  mockito: ^5.4.4
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.10

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#1a1a2e"
  image: "assets/splash/logo.png"
  android: true
  ios: true

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icon/
    - assets/splash/
